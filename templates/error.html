<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Results Found — DineAdvisor</title>

  <!-- Fonts & Icons -->
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --bg-dark: #05080a;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-border: rgba(255, 255, 255, 0.08);
      --white: #ffffff;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --glass-bg: rgba(10, 15, 20, 0.7);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      background-image:
        radial-gradient(circle at 100% 0%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 0% 100%, rgba(59, 130, 246, 0.08) 0%, transparent 40%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1,
    .nav-brand {
      font-family: 'Outfit', sans-serif;
    }

    /* ── NAVBAR ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 80px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--surface-border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 500;
      margin-left: 40px;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    /* ── MAIN ── */
    .page-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .error-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(40px);
      border-radius: 32px;
      border: 1px solid var(--surface-border);
      padding: 60px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
    }

    .error-icon {
      width: 100px;
      height: 100px;
      background: rgba(16, 185, 129, 0.1);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      transform: rotate(-5deg);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .error-icon i {
      font-size: 40px;
      color: var(--primary);
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    .error-message {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 14px 32px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-family: 'Outfit';
      transition: all 0.3s;
      box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(16, 185, 129, 0.3);
    }

    .btn-outline {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      color: var(--white);
      padding: 14px 32px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .tips {
      margin-top: 40px;
      text-align: left;
      border-top: 1px solid var(--surface-border);
      padding-top: 32px;
    }

    .tips h3 {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .tips ul {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .tips li {
      font-size: 14px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tips i {
      color: var(--primary);
    }

    footer {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      border-top: 1px solid var(--surface-border);
    }

    @media (max-width: 768px) {
      nav {
        padding: 20px 80px;
      }

      .error-card {
        padding: 40px 30px;
      }
    }
  </style>
</head>
</head>

<body>
  <nav>
    <a class="nav-brand" href="/">
      DineAdvisor
    </a>

    <button class="nav-toggle" id="navToggle">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-links" id="navLinks">
      <a href="/">Home</a>
      <a href="/recommend">Search</a>
    </div>
  </nav>

  <script>
    document.getElementById("navToggle").onclick = function () {
      document.getElementById("navLinks").classList.toggle("open");
    };
  </script>

  <div class="page-body">
    <div class="error-card">
      <div class="error-icon">
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>

      <h1>No Results Found</h1>

      <div class="error-message">{{ message }}</div>

      <div class="btn-group">
        <a href="/recommend" class="btn-primary">Try Again</a>
        <a href="/" class="btn-outline">Home</a>
      </div>

      <div class="tips">
        <h3>Helpful Tips</h3>
        <ul>
          <li><i class="fa-solid fa-circle-info"></i> Check spelling</li>
          <li><i class="fa-solid fa-circle-info"></i> Try broader filters</li>
          <li><i class="fa-solid fa-circle-info"></i> Use full names</li>
          <li><i class="fa-solid fa-circle-info"></i> Lower rating filter</li>
        </ul>
      </div>
    </div>
  </div>

  <footer>
    © 2026 DineAdvisor · Developed by Sakshi Chougale
  </footer>
</body>

</html>
